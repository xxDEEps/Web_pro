<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/Logo-FU-01.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRO192 · Object-Oriented Programming using Java</title>
    <meta name="description" content="Tài liệu tham khảo và học tập môn PRO192 - Lập trình hướng đối tượng với Java tại Đại học FPT." />
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pro192:theme');
          if (t !== 'dark' && t !== 'light') {
            t = 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
